<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <!-- Fog layer gradients -->
    <radialGradient id="fog1" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#2a1f14" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fog2" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1a1208" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fog3" cx="50%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#2a1f14" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>

    <!-- Candle flame gradient -->
    <radialGradient id="flameGlow" cx="50%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#c8b89a" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#8b7355" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="flameCore" cx="50%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#e8d4b0" stop-opacity="1"/>
      <stop offset="60%" stop-color="#c8b89a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8b7355" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip path for fog containment -->
    <clipPath id="scene">
      <rect width="400" height="200"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" fill="#0a0a0f"/>

  <!-- Fog layer 1 — slow rightward drift -->
  <g clip-path="url(#scene)">
    <ellipse cx="200" cy="140" rx="220" ry="70" fill="url(#fog1)" opacity="0.7">
      <animateTransform attributeName="transform" type="translate"
        values="-60,0; 60,0; -60,0"
        dur="18s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"/>
      <animate attributeName="opacity"
        values="0.5; 0.8; 0.5"
        dur="18s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Fog layer 2 — slow leftward drift, offset timing -->
    <ellipse cx="180" cy="120" rx="180" ry="55" fill="url(#fog2)" opacity="0.5">
      <animateTransform attributeName="transform" type="translate"
        values="40,0; -40,0; 40,0"
        dur="22s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"/>
      <animate attributeName="opacity"
        values="0.3; 0.6; 0.3"
        dur="22s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Fog layer 3 — very slow, wide -->
    <ellipse cx="220" cy="160" rx="240" ry="45" fill="url(#fog3)" opacity="0.4">
      <animateTransform attributeName="transform" type="translate"
        values="-30,0; 30,0; -30,0"
        dur="28s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"/>
    </ellipse>
  </g>

  <!-- Candle glow halo -->
  <ellipse cx="200" cy="108" rx="28" ry="20" fill="url(#flameGlow)">
    <animate attributeName="rx" values="28;32;26;30;28" dur="3.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1.0;0.6;0.9;0.7" dur="3.4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Candle body -->
  <rect x="196" y="118" width="8" height="30" rx="1" fill="#4a3728"/>
  <!-- Candle top highlight -->
  <rect x="197" y="118" width="3" height="4" rx="1" fill="#6a5040" opacity="0.6"/>

  <!-- Flame — outer -->
  <path d="M200,118 C196,110 193,102 200,94 C207,102 204,110 200,118 Z"
        fill="url(#flameCore)" opacity="0.9">
    <animateTransform attributeName="transform" type="skewX"
      values="0; 4; -3; 2; -4; 1; 0"
      dur="2.8s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1"
      additive="sum"/>
    <animate attributeName="opacity" values="0.9;1.0;0.8;1.0;0.9" dur="2.8s" repeatCount="indefinite"/>
  </path>

  <!-- Flame — inner bright core -->
  <path d="M200,117 C198,112 197,106 200,100 C203,106 202,112 200,117 Z"
        fill="#e8d4b0" opacity="0.8">
    <animateTransform attributeName="transform" type="skewX"
      values="0; 3; -2; 3; -3; 0"
      dur="2.8s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1"
      additive="sum"/>
  </path>

  <!-- Wick -->
  <line x1="200" y1="118" x2="200" y2="115" stroke="#2a1f14" stroke-width="1.5"/>
</svg>
